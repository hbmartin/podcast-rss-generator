[tools]
go = "1.25.11"
golangci-lint = "2.12.2"

[tasks.build]
description = "Build all packages"
run = "go build ./..."

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks.coverage]
description = "Run tests with coverage"
run = "go test -coverprofile=coverage.txt ./..."

[tasks.fmt]
description = "Format Go files"
run = "go fmt ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.check]
description = "Run formatting, linting, and tests"
run = [
  "mise run fmt",
  "mise run lint",
  "mise run test",
]

[tasks.readme]
description = "Regenerate README.md from package docs"
alias = ["README"]
run = '''
repo="eduncan911/podcast"
godoc2ghmd="github.com/DevotedHealth/godoc2ghmd@v0.0.0-20241011165539-2980f78e3b95"
tmp=$(mktemp)
trap 'rm -f "$tmp"' EXIT

go run -mod=mod "$godoc2ghmd" -play -ex "github.com/$repo" > "$tmp"

{
  printf '%s\n' "[![GoDoc](https://godoc.org/github.com/$repo?status.svg)](https://godoc.org/github.com/$repo)"
  printf '%s\n' "[![Build Status](https://github.com/$repo/workflows/CI/badge.svg)](https://github.com/$repo/actions?workflow=CI)"
  printf '%s\n' "[![Coverage Status](https://codecov.io/gh/$repo/branch/master/graph/badge.svg)](https://codecov.io/gh/$repo)"
  printf '%s\n' "[![Go Report Card](https://goreportcard.com/badge/github.com/$repo)](https://goreportcard.com/report/github.com/$repo)"
  printf '%s\n' "[![MIT License](https://img.shields.io/npm/l/mediaelement.svg)](https://eduncan911.mit-license.org/)"
  printf '\n'
  cat "$tmp"
} > README.md
'''

[tasks.mod-tidy-check]
description = "Verify go.mod and go.sum are tidy"
run = '''
tmp=$(mktemp -d)
trap 'rm -rf "$tmp"' EXIT

cp go.mod "$tmp/go.mod"
cp go.sum "$tmp/go.sum"

go mod tidy

if ! cmp -s go.mod "$tmp/go.mod" || ! cmp -s go.sum "$tmp/go.sum"; then
  printf '\ngo mod tidy changed these files:\n\n'
  git diff -- go.mod go.sum
  printf '\n'
  exit 1
fi
'''

[tasks.clean]
description = "Remove generated fuzz artifacts"
run = "rm -rf corpus crashers suppressions workdir podcast-fuzz.zip"
