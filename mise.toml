[tools]
go = "1.26.4"
golangci-lint = "2.12.2"

[tasks.build]
description = "Build all packages"
run = "go build ./..."

[tasks.vet]
description = "Vet all packages"
run = "go vet ./..."

[tasks.test]
description = "Run unit tests with race detection"
run = "go test -race ./..."

[tasks.coverage]
description = "Run tests with coverage"
run = "go test -coverprofile=coverage.txt ./..."

[tasks.fuzz-smoke]
description = "Run the native Go fuzz target briefly"
run = "go test -run '^$' -fuzz=FuzzPodcastEncode -fuzztime=10s ./..."

[tasks.fmt]
description = "Format Go files"
run = "go fmt ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.check]
description = "Run formatting, linting, and tests"
run = [
  "mise run fmt",
  "mise run lint",
  "mise run vet",
  "mise run test",
]

[tasks.readme]
description = "Regenerate README.md from package docs"
alias = ["README"]
run = '''
repo="hbmartin/podcast-rss-generator"
module="github.com/$repo/v2"
godoc2ghmd="github.com/DevotedHealth/godoc2ghmd@v0.0.0-20241011165539-2980f78e3b95"
tmp=$(mktemp)
trap 'rm -f "$tmp"' EXIT

go run -mod=mod "$godoc2ghmd" -play -ex "$module" > "$tmp"

{
  printf '%s\n' "[![Go Reference](https://pkg.go.dev/badge/$module.svg)](https://pkg.go.dev/$module)"
  printf '%s\n' "[![CI](https://github.com/$repo/actions/workflows/ci.yml/badge.svg?branch=master)](https://github.com/$repo/actions/workflows/ci.yml)"
  printf '%s\n' "[![Coverage Status](https://codecov.io/gh/$repo/branch/master/graph/badge.svg)](https://codecov.io/gh/$repo)"
  printf '%s\n' "[![Go Report Card](https://goreportcard.com/badge/$module)](https://goreportcard.com/report/$module)"
  printf '%s\n' "[![MIT License](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)"
  printf '\n'
  cat "$tmp"
} > README.md
'''

[tasks.mod-tidy-check]
description = "Verify go.mod and go.sum are tidy"
run = '''
tmp=$(mktemp -d)
trap 'rm -rf "$tmp"' EXIT

cp go.mod "$tmp/go.mod"
cp go.sum "$tmp/go.sum"

go mod tidy

if ! cmp -s go.mod "$tmp/go.mod" || ! cmp -s go.sum "$tmp/go.sum"; then
  printf '\ngo mod tidy changed these files:\n\n'
  git diff -- go.mod go.sum
  printf '\n'
  exit 1
fi
'''

[tasks.clean]
description = "Remove generated fuzz artifacts"
run = "rm -rf corpus crashers suppressions workdir podcast-fuzz.zip"
