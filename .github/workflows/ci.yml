permissions:
  contents: read
name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Cross-platform build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    # The OS matrix validates cross-platform compilation and vetting. Race-enabled
    # tests run on Ubuntu in the test job to keep CI runtime predictable.
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Build
        run: mise run build
      - name: Vet
        run: mise run vet

  compat:
    name: Go compat (${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Validates the module against the go.mod language floor and the current
    # stable release, so a newer language/stdlib feature can't silently raise
    # the minimum Go version consumers need. Uses setup-go rather than mise so
    # the toolchain can vary independently of the pinned dev version.
    strategy:
      fail-fast: false
      matrix:
        go:
          - "1.24" # module floor declared in go.mod
          - "1.26" # current stable pinned in mise.toml

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  test:
    name: Race test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - run: mise run test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Run tests with coverage
        run: mise run coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required: allow read access to the content for analysis.
      # See https://github.com/golangci/golangci-lint-action?tab=readme-ov-file#annotations
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - run: mise run lint

      - name: Go mod
        run: mise run mod-tidy-check
