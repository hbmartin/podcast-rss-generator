permissions:
  contents: read
name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run build
      - run: mise run vet

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Run tests with coverage
        run: mise run coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required: allow read access to the content for analysis.
      # See https://github.com/golangci/golangci-lint-action?tab=readme-ov-file#annotations
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run lint

      - name: Go mod
        run: mise run mod-tidy-check
